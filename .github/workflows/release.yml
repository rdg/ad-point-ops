name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Maintains the "chore(main): release X.Y.Z" PR from Conventional Commits
  # on main. When that PR is merged, this run creates the vX.Y.Z tag and a
  # published GitHub Release with the changelog as its body.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Only runs when release-please just created a release, or on a manual
  # workflow_dispatch. Gated on the job output above rather than a
  # `push: tags:` trigger, because the tag release-please creates is
  # pushed with the default GITHUB_TOKEN — GitHub Actions deliberately
  # does not fire other workflows from GITHUB_TOKEN-authored pushes, so a
  # separate tag-triggered workflow would never actually run.
  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            artifact-name: dmg
          - platform: windows-2022
            target: x86_64-pc-windows-msvc
            artifact-name: msi

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name || github.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install

      # A release build already has the right version checked in —
      # release-please bumped it as part of the release PR. A manual
      # workflow_dispatch build has no release, so it gets a synthetic
      # <base>.<run_number> version instead (numeric-only: WiX/MSI rejects
      # semver prerelease or non-numeric build metadata).
      - name: Determine dev version
        if: needs.release-please.outputs.release_created != 'true'
        id: vars
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          BASE=$(node -p "require('./src-tauri/tauri.conf.json').version")
          VERSION="${BASE}.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Set dev version
        if: needs.release-please.outputs.release_created != 'true'
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            for (const path of ['src-tauri/tauri.conf.json', 'package.json']) {
              const data = JSON.parse(fs.readFileSync(path, 'utf8'));
              data.version = '${{ steps.vars.outputs.version }}';
              fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
            }
          "

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Attach installers to GitHub Release
        if: needs.release-please.outputs.release_created == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.artifact-name }}/*.${{ matrix.artifact-name }})
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .${{ matrix.artifact-name }} bundle found under src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.artifact-name }}/" >&2
            exit 1
          fi
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "${files[@]}" --clobber

      - name: Upload artifact (manual dispatch only)
        if: needs.release-please.outputs.release_created != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: point-ops-${{ matrix.artifact-name }}-${{ steps.vars.outputs.version }}-${{ steps.vars.outputs.short_sha }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: ignore
