name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            artifact-name: dmg
          - platform: windows-2022
            target: x86_64-pc-windows-msvc
            artifact-name: msi

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install

      # Tag pushes (vX.Y.Z) use that as the version — the single source of
      # truth, so tauri.conf.json never needs a manual bump-and-hope before
      # tagging. workflow_dispatch runs have no tag, so they get a synthetic
      # <base>.<run_number> version instead (numeric-only: WiX/MSI rejects
      # semver prerelease/build metadata like "-dev.<sha>").
      - name: Determine version
        id: vars
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            BASE=$(node -p "require('./src-tauri/tauri.conf.json').version")
            VERSION="${BASE}.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Set app version
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            for (const path of ['src-tauri/tauri.conf.json', 'package.json']) {
              const data = JSON.parse(fs.readFileSync(path, 'utf8'));
              data.version = '${{ steps.vars.outputs.version }}';
              fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
            }
          "

      # On tag push: build + create a draft GitHub Release with installers attached.
      # On workflow_dispatch: build only, upload as workflow artifacts.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: point-ops ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifact (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: point-ops-${{ matrix.artifact-name }}-${{ steps.vars.outputs.version }}-${{ steps.vars.outputs.short_sha }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: ignore
